<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roata Norocului - Oprire Naturală</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .wheel-container {
            position: relative;
            width: 380px;
            height: 380px;
            margin: 2rem auto;
        }

        #wheelWrapper {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #334155;
            position: relative;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .marker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background: #ef4444;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 50;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .secret-menu {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 450px;
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #334155;
            border-top: 4px solid #ef4444;
            padding: 20px;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            border-radius: 24px 24px 0 0;
            backdrop-filter: blur(15px);
            max-height: 80vh;
            overflow-y: auto;
        }

        .secret-menu.open { bottom: 0; }

        .btn-spin {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            box-shadow: 0 4px 0 #7f1d1d;
        }
        .btn-spin:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7f1d1d;
        }
        
        input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="text-center mt-6">
        <h1 class="text-5xl font-black italic tracking-tighter uppercase">ROATA <span class="text-red-500">DESTINULUI</span></h1>
        <p class="text-slate-500 font-bold tracking-[0.3em] text-xs mt-2">OPRIRE NATURALĂ - ȘANSE ASCUNSE</p>
    </div>

    <div class="wheel-container">
        <div class="marker"></div>
        <div id="wheelWrapper">
            <canvas id="wheelCanvas" width="800" height="800" class="w-full h-full"></canvas>
        </div>
    </div>

    <div class="w-full max-w-md space-y-4">
        <button id="spinBtn" class="btn-spin w-full py-5 rounded-2xl font-black text-2xl uppercase tracking-widest transition-all">ÎNVÂRTE!</button>
        
        <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
            <div class="flex gap-2 mb-4">
                <input type="text" id="newItem" placeholder="Opțiune nouă..." class="flex-grow bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500 transition-colors">
                <button id="addBtn" class="bg-blue-600 hover:bg-blue-500 px-6 rounded-xl font-bold transition-colors">+</button>
            </div>
            <div id="itemList" class="flex flex-wrap gap-2"></div>
        </div>
    </div>

    <!-- MENIU SECRET -->
    <div id="secretMenu" class="secret-menu">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-red-500 uppercase italic">Control Panel (Secret)</h3>
            <button id="closeSecret" class="text-slate-500 hover:text-white">✕</button>
        </div>

        <div class="space-y-4">
            <div class="bg-slate-800/50 p-4 rounded-xl">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="rigActive" class="w-5 h-5 accent-red-500">
                    <span class="font-bold text-sm">FORȚEAZĂ CÂȘTIGĂTOR (RIGGED)</span>
                </label>
                <p class="text-[10px] text-slate-400 mt-1 ml-8">Câștigă instant opțiunea selectată mai jos.</p>
            </div>

            <div class="space-y-2">
                <p class="text-xs font-bold text-slate-400 uppercase">Setează Probabilitatea (Ascunsă):</p>
                <div id="chanceControls" class="space-y-2">
                    <!-- Dinamic -->
                </div>
            </div>
        </div>
    </div>

    <div id="secretTrigger" style="position: fixed; bottom: 0; right: 0; width: 30px; height: 30px; cursor: pointer; opacity: 0;"></div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const wheelWrapper = document.getElementById('wheelWrapper');
        const spinBtn = document.getElementById('spinBtn');
        const newItemInput = document.getElementById('newItem');
        const addBtn = document.getElementById('addBtn');
        const itemList = document.getElementById('itemList');
        const secretMenu = document.getElementById('secretMenu');
        const chanceControls = document.getElementById('chanceControls');
        const rigActive = document.getElementById('rigActive');

        let options = [
            { text: "DA", weight: 1 },
            { text: "NU", weight: 1 },
            { text: "POATE", weight: 1 },
            { text: "REPETĂ", weight: 1 },
            { text: "BĂUTURĂ", weight: 1 }
        ];

        let currentRotation = 0;
        let isSpinning = false;
        let riggedTargetIndex = null;

        const colors = ["#ef4444", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899", "#06b6d4"];

        function drawWheel() {
            const size = 800;
            const radius = size / 2;
            const sliceAngle = (2 * Math.PI) / options.length;
            
            ctx.clearRect(0, 0, size, size);
            
            options.forEach((opt, i) => {
                const startAngle = i * sliceAngle;
                
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, startAngle + sliceAngle);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 42px Poppins";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 10;
                ctx.fillText(opt.text, radius - 40, 15);
                ctx.restore();
            });
            
            ctx.beginPath();
            ctx.fillStyle = "#334155";
            ctx.arc(radius, radius, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function getWeightedRandom() {
            const totalWeight = options.reduce((sum, opt) => sum + opt.weight, 0);
            let random = Math.random() * totalWeight;
            for (let i = 0; i < options.length; i++) {
                if (random < options[i].weight) return i;
                random -= options[i].weight;
            }
            return 0;
        }

        function spin() {
            if (isSpinning || options.length < 2) return;
            isSpinning = true;

            let winnerIndex;

            if (rigActive.checked && riggedTargetIndex !== null) {
                winnerIndex = riggedTargetIndex;
                rigActive.checked = false; 
            } else {
                winnerIndex = getWeightedRandom();
            }

            const sliceDeg = 360 / options.length;
            
            // --- LOGICA DE OPRIRE NATURALĂ ---
            // În loc de centru (sliceDeg / 2), adăugăm un offset aleatoriu.
            // Păstrăm o zonă tampon de 10% la margini ca să nu se oprească fix pe linie.
            const padding = sliceDeg * 0.1;
            const randomOffset = padding + (Math.random() * (sliceDeg - 2 * padding));
            
            const targetPosInSlice = randomOffset;
            const targetRotationForIndex = (winnerIndex * sliceDeg) + targetPosInSlice;

            const extraSpins = 360 * (6 + Math.floor(Math.random() * 4));
            
            // Calculăm rotația finală pentru a aduce punctul ales sub marker (la 270 deg)
            const finalRotation = currentRotation + extraSpins + (270 - (currentRotation + extraSpins + targetRotationForIndex) % 360 + 360) % 360;
            
            currentRotation = finalRotation;
            wheelWrapper.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                showWinner(options[winnerIndex].text);
            }, 5000);
        }

        function showWinner(name) {
            const el = document.createElement('div');
            el.className = "fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white text-slate-900 px-10 py-6 rounded-3xl shadow-[0_0_100px_rgba(255,255,255,0.4)] z-[200] text-center border-4 border-blue-500 scale-0 transition-transform duration-500";
            el.innerHTML = `<p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Rezultat</p><h2 class="text-5xl font-black italic">${name}</h2>`;
            document.body.appendChild(el);
            setTimeout(() => el.classList.add('scale-100'), 50);
            setTimeout(() => {
                el.classList.remove('scale-100');
                setTimeout(() => el.remove(), 500);
            }, 3000);
        }

        function updateUI() {
            itemList.innerHTML = "";
            options.forEach((opt, i) => {
                const tag = document.createElement('div');
                tag.className = "bg-slate-800 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-3 border border-slate-700";
                tag.innerHTML = `<span>${opt.text}</span><button onclick="removeOption(${i})" class="text-slate-500 hover:text-red-500">✕</button>`;
                itemList.appendChild(tag);
            });

            chanceControls.innerHTML = "";
            options.forEach((opt, i) => {
                const row = document.createElement('div');
                row.className = `flex items-center gap-3 p-3 rounded-xl transition-all ${riggedTargetIndex === i ? 'bg-red-500/20 border-red-500/50' : 'bg-slate-800 border-transparent'} border`;
                
                row.innerHTML = `
                    <button class="flex-grow text-left text-sm font-bold" onclick="selectRigged(${i})">${opt.text}</button>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-slate-500 uppercase font-black">Șansă (Weight):</span>
                        <input type="number" value="${opt.weight}" min="1" max="1000" 
                            class="w-16 bg-slate-900 border border-slate-600 rounded p-1 text-center text-xs text-white"
                            onchange="updateWeight(${i}, this.value)">
                    </div>
                `;
                chanceControls.appendChild(row);
            });

            drawWheel();
        }

        window.updateWeight = (i, val) => {
            options[i].weight = parseInt(val) || 1;
        };

        window.removeOption = (i) => {
            options.splice(i, 1);
            if (riggedTargetIndex === i) riggedTargetIndex = null;
            updateUI();
        };

        window.selectRigged = (i) => {
            riggedTargetIndex = i;
            updateUI();
        };

        addBtn.onclick = () => {
            const val = newItemInput.value.trim();
            if (val) {
                options.push({ text: val, weight: 1 });
                newItemInput.value = "";
                updateUI();
            }
        };

        spinBtn.onclick = spin;

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 's') secretMenu.classList.toggle('open');
        });
        document.getElementById('secretTrigger').onclick = () => secretMenu.classList.toggle('open');
        document.getElementById('closeSecret').onclick = () => secretMenu.classList.remove('open');

        updateUI();
    </script>
</body>
</html>
