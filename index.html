<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roata Norocului</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle, #0f172a 0%, #020617 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            width: 380px;
            height: 380px;
            margin: 1.5rem auto;
        }

        #wheelWrapper {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #334155;
            position: relative;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .marker {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background: #ef4444;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 50;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        .secret-menu {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 450px;
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #334155;
            border-top: 4px solid #ef4444;
            padding: 20px;
            transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            border-radius: 24px 24px 0 0;
            backdrop-filter: blur(15px);
        }

        .secret-menu.open { bottom: 0; }

        .btn-spin {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            box-shadow: 0 4px 0 #7f1d1d;
        }
        .btn-spin:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7f1d1d;
        }
    </style>
</head>
<body class="p-4">

    <div class="text-center mb-2">
        <h1 id="titleTrigger" class="text-5xl font-black italic tracking-tighter uppercase select-none cursor-default">ROATA <span class="text-red-500">NOROCULUI</span></h1>
        <!-- Textul de dedesubt a fost șters -->
    </div>

    <div class="wheel-container">
        <div class="marker"></div>
        <div id="wheelWrapper">
            <canvas id="wheelCanvas" width="800" height="800" class="w-full h-full"></canvas>
        </div>
    </div>

    <div class="w-full max-w-md space-y-4">
        <button id="spinBtn" class="btn-spin w-full py-5 rounded-2xl font-black text-2xl uppercase tracking-widest transition-all">ÎNVÂRTE!</button>
        
        <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
            <div class="flex gap-2 mb-4">
                <input type="text" id="newItem" placeholder="Opțiune nouă..." class="flex-grow bg-slate-800 p-3 rounded-xl border border-slate-700 outline-none focus:border-blue-500 transition-colors text-white">
                <button id="addBtn" class="bg-blue-600 hover:bg-blue-500 px-6 rounded-xl font-bold transition-colors">+</button>
            </div>
            <div id="itemList" class="flex flex-wrap gap-2"></div>
        </div>
    </div>

    <!-- MENIU SECRET -->
    <div id="secretMenu" class="secret-menu">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-black text-red-500 uppercase italic">Control Panel</h3>
            <button id="closeSecret" class="text-slate-500 hover:text-white">✕</button>
        </div>
        <div class="space-y-4">
            <div class="bg-slate-800/50 p-4 rounded-xl">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="rigActive" class="w-5 h-5 accent-red-500">
                    <span class="font-bold text-sm text-white uppercase">Forțează câștigător</span>
                </label>
            </div>
            <div id="chanceControls" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const wheelWrapper = document.getElementById('wheelWrapper');
        const spinBtn = document.getElementById('spinBtn');
        const newItemInput = document.getElementById('newItem');
        const addBtn = document.getElementById('addBtn');
        const itemList = document.getElementById('itemList');
        const secretMenu = document.getElementById('secretMenu');
        const chanceControls = document.getElementById('chanceControls');
        const rigActive = document.getElementById('rigActive');

        let options = [
            { text: "DA", weight: 1 },
            { text: "NU", weight: 1 },
            { text: "POATE", weight: 1 },
            { text: "MAI STAI", weight: 1 },
            { text: "BĂUTURĂ", weight: 1 }
        ];

        let currentRotation = 0;
        let isSpinning = false;
        let riggedTargetIndex = null;
        let clickCount = 0;

        const colors = ["#ef4444", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899"];

        function drawWheel() {
            const size = 800;
            const radius = size / 2;
            const sliceAngle = (2 * Math.PI) / options.length;
            ctx.clearRect(0, 0, size, size);
            options.forEach((opt, i) => {
                const startAngle = i * sliceAngle;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, startAngle, startAngle + sliceAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(startAngle + sliceAngle / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 44px Poppins";
                ctx.shadowColor = "rgba(0,0,0,0.5)";
                ctx.shadowBlur = 8;
                ctx.fillText(opt.text, radius - 40, 15);
                ctx.restore();
            });
            ctx.beginPath();
            ctx.fillStyle = "#334155";
            ctx.arc(radius, radius, 20, 0, Math.PI * 2);
            ctx.fill();
        }

        function spin() {
            if (isSpinning || options.length < 2) return;
            isSpinning = true;
            let winnerIndex;
            if (rigActive.checked && riggedTargetIndex !== null) {
                winnerIndex = riggedTargetIndex;
                rigActive.checked = false;
            } else {
                const totalWeight = options.reduce((s, o) => s + o.weight, 0);
                let r = Math.random() * totalWeight;
                for (let i = 0; i < options.length; i++) {
                    if (r < options[i].weight) { winnerIndex = i; break; }
                    r -= options[i].weight;
                }
            }
            const sliceDeg = 360 / options.length;
            const offset = (sliceDeg * 0.2) + (Math.random() * (sliceDeg * 0.6));
            const targetRotation = (winnerIndex * sliceDeg) + offset;
            const extra = 360 * 8;
            const final = currentRotation + extra + (270 - (currentRotation + extra + targetRotation) % 360 + 360) % 360;
            currentRotation = final;
            wheelWrapper.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(() => {
                isSpinning = false;
                const winText = options[winnerIndex].text;
                // Popup simplu
                const popup = document.createElement('div');
                popup.className = "fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white text-slate-900 px-12 py-8 rounded-3xl shadow-2xl z-[500] text-center border-4 border-red-500";
                popup.innerHTML = `<h2 class="text-4xl font-black italic uppercase">${winText}</h2>`;
                document.body.appendChild(popup);
                setTimeout(() => popup.remove(), 3000);
            }, 5200);
        }

        function updateUI() {
            itemList.innerHTML = "";
            options.forEach((opt, i) => {
                const t = document.createElement('div');
                t.className = "bg-slate-800 px-3 py-1 rounded-lg text-xs font-bold flex items-center gap-2 border border-slate-700";
                t.innerHTML = `${opt.text} <button onclick="removeOption(${i})" class="text-slate-500">✕</button>`;
                itemList.appendChild(t);
            });
            chanceControls.innerHTML = "";
            options.forEach((opt, i) => {
                const row = document.createElement('div');
                row.className = `flex items-center justify-between p-2 rounded-xl ${riggedTargetIndex === i ? 'bg-red-500/20' : 'bg-slate-800'}`;
                row.innerHTML = `<button class="text-xs font-bold text-white uppercase" onclick="selectRigged(${i})">${opt.text}</button>
                <input type="number" value="${opt.weight}" class="w-12 bg-black text-white text-[10px] p-1 rounded" onchange="updateWeight(${i}, this.value)">`;
                chanceControls.appendChild(row);
            });
            drawWheel();
        }

        window.removeOption = i => { options.splice(i, 1); updateUI(); };
        window.updateWeight = (i, v) => { options[i].weight = parseInt(v) || 1; };
        window.selectRigged = i => { riggedTargetIndex = i; updateUI(); };
        addBtn.onclick = () => { if(newItemInput.value) { options.push({text: newItemInput.value, weight: 1}); newItemInput.value=""; updateUI(); } };
        spinBtn.onclick = spin;

        window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 's') secretMenu.classList.toggle('open'); });
        document.getElementById('titleTrigger').onclick = () => {
            clickCount++;
            if(clickCount >= 5) { secretMenu.classList.add('open'); clickCount = 0; }
            setTimeout(() => clickCount = 0, 1500);
        };
        document.getElementById('closeSecret').onclick = () => secretMenu.classList.remove('open');
        updateUI();
    </script>
</body>
</html>
